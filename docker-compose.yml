version: '3.8'

services:
  postgres: # 서비스용 PostgreSQL
    image: postgres:15-alpine # 알파인 기반의 가벼운 이미지
    container_name: codebattle_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/src/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./server/src/db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql

  judge0-server: # judge0 API 서버
    image: judge0/judge0:1.13.1
    container_name: codebattle_judge0
    ports:
      - '2358:2358'
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    privileged: true # 코드 실행 시스템이기 때문에 높은 권한 필요
    restart: unless-stopped # 사용자가 stop하지 않는 한 컨테이너가 죽으면 자동 재시작
    depends_on: # redis와 postgres가 먼저 실행되지 않으면 채점을 할 수 없기 때문에 먼저 실행되어야 한다고 명시
      - judge0-redis
      - judge0-postgres

  judge0-workers: # Judge0 채점 워커
    image: judge0/judge0:1.13.1
    container_name: codebattle_judge0_workers
    command: ['./scripts/workers']
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    privileged: true
    restart: unless-stopped # 사용자가 stop하지 않는 한 컨테이너가 죽으면 자동 재시작
    depends_on: # redis와 postgres가 먼저 실행되지 않으면 채점을 할 수 없기 때문에 먼저 실행되어야 한다고 명시
      - judge0-redis
      - judge0-postgres

  judge0-redis: # Judge0 작업 큐용 Redis
    image: redis:7-alpine
    container_name: codebattle_judge0_redis

  judge0-postgres: # Judge0 내부용 PostgreSQL
    image: postgres:14-alpine
    container_name: codebattle_judge0_postgres
    environment:
      POSTGRES_USER: ${JUDGE0_POSTGRES_USER}
      POSTGRES_PASSWORD: ${JUDGE0_POSTGRES_PASSWORD}
      POSTGRES_DB: ${JUDGE0_POSTGRES_DB}
    volumes:
      - judge0_postgres_data:/var/lib/postgresql/data

volumes: # 도커 볼륨에 저장할 것들. 비휘발성
  postgres_data:
  judge0_postgres_data: